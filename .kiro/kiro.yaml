# Kiro 全局配置文件
# 用于管理模块版本和全局设置

version: "1.0"

# 工作流配置（双轨工作流）
workflow:
  # 默认工作流类型（保留用于向后兼容）
  default: "prompt"  # prompt / code
  
  # 按目录/文件自动切换工作流（保留用于向后兼容）
  auto_switch:
    # Prompt 工作流规则
    - pattern: ".kiro/steering/*.md"
      workflow: "prompt"
      description: "Steering 规则文件"
    
    - pattern: ".kiro/hooks/*.json"
      workflow: "prompt"
      description: "Hook 规则文件"
    
    - pattern: "doc/project/*.md"
      workflow: "prompt"
      description: "项目文档"
    
    - pattern: ".kiro/kiro.yaml"
      workflow: "prompt"
      description: "配置文件"
    
    # 代码工作流规则
    - pattern: "**/*.py"
      workflow: "code"
      description: "Python 代码文件"
    
    - pattern: ".kiro/modules/*/scripts/*.py"
      workflow: "code"
      description: "模块脚本文件"
    
    - pattern: "scripts/*.py"
      workflow: "code"
      description: "脚本文件"

# 当前激活的模块版本
active_modules:
  ai-dev: "v1.0"          # AI Development 自动化管理模块
  doc-save: "v1.0"        # 会话文档自动保存模块
  prompt-manager: "v1.0"  # 提示词版本管理模块
  workflow: "v2.0"        # VibeCoding 工作流（新版本）

# 模块路径模板
# 使用 {module} 和 {version} 作为占位符
module_path_template: ".kiro/modules/{module}/{version}"

# 全局设置
settings:
  # 是否自动提交 doc 目录到 Git
  auto_commit_doc: true
  
  # 提示词格式：json 或 markdown
  prompt_format: "json"
  
  # Git 默认分支
  default_branch: "master"
  
  # 是否启用详细日志
  verbose_logging: false

# 商业化配置（可选）
commercial:
  # 需要许可证的模块列表
  licensed_modules:
    - ai-dev
    - prompt-manager
  
  # 许可证密钥（从环境变量或 .env 文件读取）
  license_key: ""
  
  # 许可证验证服务器（可选）
  license_server: ""

# 模块依赖关系（可选）
dependencies:
  prompt-manager:
    - ai-dev  # prompt-manager 依赖 ai-dev

# 实验性功能开关（可选）
experimental:
  # 是否启用自动 RFC 记录
  auto_rfc_recording: false
  
  # 是否启用提示词效果评估
  prompt_effect_evaluation: true
  
  # 是否启用 Git 自动回滚功能
  git_auto_rollback: true  # 测试期间启用

# Git 回滚配置
rollback:
  backup:
    enabled: true                    # 是否启用备份
    push_to_remote: false           # 是否推送到远程
    auto_delete_after_days: 7       # 自动删除天数（0=不删除）

