# AI 开发自动化模块配置

# 开发模式
dev_mode:
  # 是否启用调试模式
  debug: false
  
  # 是否启用详细日志
  verbose: false

# 自动化功能
automation:
  # 是否自动生成代码
  auto_generate_code: true
  
  # 是否自动运行测试
  auto_run_tests: false
  
  # 是否自动格式化代码
  auto_format: true

# 代码生成
code_generation:
  # 默认编程语言
  default_language: "python"
  
  # 代码风格
  style: "pep8"  # python: pep8, black; javascript: standard, airbnb
  
  # 是否生成注释
  generate_comments: true
  
  # 是否生成文档字符串
  generate_docstrings: true

# 测试配置
testing:
  # 测试框架
  framework: "pytest"  # pytest, unittest, jest, mocha
  
  # 是否生成测试文件
  generate_tests: true
  
  # 测试覆盖率目标
  coverage_target: 80

# AI 模型配置
ai_model:
  # 模型选择
  model: "gpt-4"
  
  # 温度参数
  temperature: 0.7
  
  # 最大 token 数
  max_tokens: 2000
