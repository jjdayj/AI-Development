# Git 回滚模块配置

# 备份配置
backup:
  enabled: true                    # 是否启用备份
  push_to_remote: false           # 是否推送到远程
  auto_delete_after_days: 7       # 自动删除天数（0=不删除）

# 回滚确认
confirmation:
  required: true                   # 是否需要用户确认
  show_affected_files: true       # 是否显示影响的文件
  show_commit_details: true       # 是否显示提交详情

# 安全检查
safety:
  check_working_directory: true   # 检查工作目录是否干净
  allow_force_push: false         # 是否允许强制推送
