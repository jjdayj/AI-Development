# 工作流模块配置（完整版）

# 默认工作流类型
default_workflow: prompt  # prompt / code

# Phase 5 总结反思配置
phase5:
  mandatory: true  # 是否强制执行 Phase 5
  generate_docs: true  # 是否生成三份文档
  
  # 文档生成配置
  docs:
    quick_start: true  # 快速入门指南
    detailed: true     # 详细说明文档
    summary: true      # 总结与反思文档

# 工作流时间预估（小时）
time_estimates:
  prompt_workflow: 2.5  # Prompt 工作流预计时间
  code_workflow: 8.0    # 代码工作流预计时间
  quick_fix: 0.2        # 快速修改预计时间
