# 测试配置文件：基本加载测试
# 
# 测试目标：验证系统能够正确读取配置文件并加载启用的模块
# 
# 需求追溯：
# - 需求 1：读取顶层模块配置
# - 需求 2：顶层全局开关管理
# - 需求 5：计算模块激活状态
# - 需求 6：按优先级排序激活的模块
# 
# 预期结果：
# - 成功读取配置文件
# - 加载 3 个模块：workflow, ai-dev, git-commit
# - 加载顺序：workflow (200) → ai-dev (100) → git-commit (80)
# - 所有模块的全局开关都为 true
# - 所有模块使用默认激活条件（always: true）

version: "2.0"

modules:
  workflow:
    enabled: true
    version: v1.0
    priority: 200
  
  ai-dev:
    enabled: true
    version: v1.0
    priority: 100
  
  git-commit:
    enabled: true
    version: v1.0
    priority: 80
