# 测试配置文件：循环依赖测试
# 
# 测试目标：验证系统能够正确检测并处理循环依赖
# 
# 需求追溯：
# - 隐含需求：模块依赖关系校验
# - 循环依赖检测：使用 DFS 算法检测依赖图中的环
# - 错误处理：如果检测到循环依赖，系统应输出错误并跳过所有涉及的模块
# 
# 测试场景：
# 1. 简单循环：module-x 依赖 module-y，module-y 依赖 module-x
# 2. 三角循环：module-p 依赖 module-q，module-q 依赖 module-r，module-r 依赖 module-p
# 3. 无循环：module-z 无依赖，应正常加载
# 
# 预期结果：
# - 成功读取配置文件
# - 检测到循环依赖：{module-x, module-y}
# - 检测到循环依赖：{module-p, module-q, module-r}
# - 输出错误：检测到循环依赖
# - module-x 和 module-y 因循环依赖被跳过
# - module-p、module-q、module-r 因循环依赖被跳过
# - module-z 无依赖，成功加载
# - 最终加载摘要：1 个成功，5 个失败（循环依赖）

version: "2.0"

modules:
  # 简单循环：module-x <-> module-y
  module-x:
    enabled: true
    version: v1.0
    priority: 100
    # module-x 依赖 module-y
  
  module-y:
    enabled: true
    version: v1.0
    priority: 90
    # module-y 依赖 module-x（形成循环）
  
  # 三角循环：module-p -> module-q -> module-r -> module-p
  module-p:
    enabled: true
    version: v1.0
    priority: 80
    # module-p 依赖 module-q
  
  module-q:
    enabled: true
    version: v1.0
    priority: 70
    # module-q 依赖 module-r
  
  module-r:
    enabled: true
    version: v1.0
    priority: 60
    # module-r 依赖 module-p（形成循环）
  
  # 无循环依赖的模块
  module-z:
    enabled: true
    version: v1.0
    priority: 50
    # module-z 无依赖，应该正常加载
