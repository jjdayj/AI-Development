# 测试配置文件：依赖缺失测试
# 
# 测试目标：验证系统能够正确检测并处理模块依赖缺失的情况
# 
# 需求追溯：
# - 隐含需求：模块依赖关系校验
# - 依赖规则：依赖的模块必须在激活列表中
# - 错误处理：如果依赖缺失，系统应输出警告并跳过该模块
# 
# 测试场景：
# 1. module-a 依赖 module-b，但 module-b 的 enabled: false
# 2. module-c 依赖 module-d，但 module-d 不在配置中
# 3. module-e 无依赖，应正常加载
# 
# 预期结果：
# - 成功读取配置文件
# - module-b 因 enabled: false 被过滤
# - module-a 因依赖 module-b 缺失被跳过，输出警告：缺少依赖 [module-b]
# - module-c 因依赖 module-d 缺失被跳过，输出警告：缺少依赖 [module-d]
# - module-e 无依赖，成功加载
# - 最终加载摘要：1 个成功，2 个失败（依赖缺失）

version: "2.0"

modules:
  module-a:
    enabled: true
    version: v1.0
    priority: 100
    # module-a 依赖 module-b，但 module-b 被禁用
    # 预期：module-a 应该被跳过
  
  module-b:
    enabled: false  # 被禁用，不会被加载
    version: v1.0
    priority: 90
  
  module-c:
    enabled: true
    version: v1.0
    priority: 80
    # module-c 依赖 module-d，但 module-d 不在配置中
    # 预期：module-c 应该被跳过
  
  module-e:
    enabled: true
    version: v1.0
    priority: 70
    # module-e 无依赖，应该正常加载
