# 测试配置文件：OR 逻辑条件测试
# 
# 测试目标：验证系统能够正确处理 OR 逻辑组合的激活条件
# 
# 需求追溯：
# - 需求 4.3：当模块配置了多个条件时，系统应支持 AND/OR 逻辑组合
# - OR 逻辑：任一子条件满足，模块就会激活
# 
# 测试场景：
# 1. test-or-1: 目录匹配 OR 文件类型匹配
# 2. test-or-2: 多个目录匹配条件（OR 逻辑）
# 3. test-or-3: 多个文件类型匹配条件（OR 逻辑）
# 4. test-or-4: 所有条件都不满足
# 
# 测试上下文：
# - 当前目录：.kiro/steering/
# - 当前文件：main.md
# - 当前文件类型：.md
# 
# 预期结果：
# - test-or-1 应该激活（目录匹配 .kiro/steering/* 满足）
# - test-or-2 应该激活（目录匹配 .kiro/* 满足）
# - test-or-3 应该激活（文件类型 .md 满足）
# - test-or-4 应该不激活（所有条件都不满足）
# - 最终加载：3 个模块（test-or-1, test-or-2, test-or-3）

version: "2.0"

modules:
  test-or-1:
    enabled: true
    version: v1.0
    priority: 100
    # 配置在模块配置文件中
    # 条件：OR (directory_match: .kiro/steering/*, file_type_match: .yaml)
    # 预期：激活（目录匹配满足）
  
  test-or-2:
    enabled: true
    version: v1.0
    priority: 90
    # 配置在模块配置文件中
    # 条件：OR (directory_match: .kiro/*, directory_match: doc/project/*)
    # 预期：激活（第一个条件满足）
  
  test-or-3:
    enabled: true
    version: v1.0
    priority: 80
    # 配置在模块配置文件中
    # 条件：OR (file_type_match: .md, file_type_match: .yaml)
    # 预期：激活（第一个条件满足）
  
  test-or-4:
    enabled: true
    version: v1.0
    priority: 70
    # 配置在模块配置文件中
    # 条件：OR (directory_match: src/*, file_type_match: .py)
    # 预期：不激活（所有条件都不满足）
