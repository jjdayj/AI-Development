# AI Development 模块元数据

version: "v1.0"
name: "ai-dev"
display_name: "AI Development 自动化管理"
description: "通过简单中文指令完成项目全流程自动化：智能命名转换、目录创建、Git 初始化、GitHub 仓库创建和推送"

# 版本信息
update_time: "2026-03-01 23:45:00"
author: "用户"
license: "MIT"

# 变更日志
changelog: |
  v1.0 (2026-03-01):
  - 初始版本
  - 支持中文指令转英文参数
  - 支持项目目录创建和 README 生成
  - 支持 Git 仓库初始化和提交
  - 支持 GitHub 远程仓库创建和推送
  - 支持步骤开关配置（init_project/local_git/remote_git）

# 适用场景
use_cases:
  - "GitHub 项目初始化"
  - "实际项目管理（自动化工具、AI 脚本等）"
  - "问题解决流程记录"

# 依赖模块
dependencies: []

# 是否为破坏性更新
breaking_changes: false

# 模块文件结构
files:
  steering:
    - "ai-dev.md: Kiro 命名规则和命令生成规则"
  scripts:
    - "ai-dev-script.py: Python 自动化执行脚本"
  configs:
    - "ai-dev-config.json: 步骤执行开关配置"

# 配置说明
configuration:
  global_execution: "全局开关，true 时强制执行所有步骤"
  execution_steps:
    init_project: "初始化项目（创建目录 + 生成 README）"
    local_git: "本地 Git 管理（初始化 + 添加 + 提交）"
    remote_git: "远程 Git 推送（创建仓库 + 配置远程 + 推送）"
  default_branch: "Git 默认分支（master/main）"

# 环境要求
requirements:
  python: ">=3.7"
  packages:
    - "requests"
    - "gitpython"
    - "python-dotenv"
  environment_variables:
    - "GITHUB_TOKEN: GitHub 访问令牌（必需）"
    - "GITHUB_USER: GitHub 用户名（可选，默认从 .env 读取）"

# 使用示例
examples:
  - description: "创建实际项目"
    command: "/ai-dev 新建实际项目：自动化工具类，AI 日志分析脚本 v1.0，状态待测试"
  - description: "创建问题解决项目"
    command: "/ai-dev 新建问题解决流程：2026-03-01 Git 权限错误，状态完成"

# 已知问题
known_issues: []

# 未来计划
roadmap:
  - "v1.1: 支持 GitLab 和 Gitee"
  - "v1.2: 支持项目模板自定义"
  - "v2.0: 支持多语言项目初始化"
