# 测试配置文件：缺少必需字段测试
# 
# 测试目标：验证系统能够正确处理缺少必需字段的模块配置
# 
# 需求追溯：
# - 需求 1.4：系统应验证每个模块配置包含必需字段（enabled、version、priority）
# - 需求 13.3：如果模块配置缺少必需字段，则系统应输出警告并跳过该模块
# 
# 预期结果：
# - 成功读取配置文件
# - workflow 模块缺少 version 字段，应输出警告并跳过
# - ai-dev 模块缺少 priority 字段，应输出警告并跳过
# - git-commit 模块缺少 enabled 字段，应输出警告并跳过
# - 只有 git-rollback 模块配置完整，应成功加载
# - 日志中应明确标注每个模块缺少的字段
# - 最终加载摘要：1 个成功，3 个失败

version: "2.0"

modules:
  workflow:
    enabled: true
    # 缺少 version 字段 - 应该被跳过
    priority: 200
  
  ai-dev:
    enabled: true
    version: v1.0
    # 缺少 priority 字段 - 应该被跳过
  
  git-commit:
    # 缺少 enabled 字段 - 应该被跳过
    version: v1.0
    priority: 80
  
  git-rollback:
    enabled: true
    version: v1.0
    priority: 70
    # 这是唯一配置完整的模块，应该成功加载
