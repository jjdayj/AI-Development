# 测试配置文件：优先级排序测试
# 
# 测试目标：验证系统能够按优先级正确排序激活的模块
# 
# 需求追溯：
# - 需求 6.1：系统应按 priority 从高到低排序
# - 需求 6.2：如果两个模块的 priority 相同，则按模块名称字母顺序排序
# 
# 预期结果：
# - 成功读取配置文件
# - 加载 5 个模块：workflow, ai-dev, doc-save, git-commit, git-rollback
# - 加载顺序（按优先级从高到低）：
#   1. workflow (200)
#   2. ai-dev (100)
#   3. doc-save (90)
#   4. git-commit (80)
#   5. git-rollback (70)
# - 日志中应明确显示每个模块的优先级
# 
# 额外测试场景：
# - 如果将 ai-dev 和 doc-save 的优先级都设为 100，则应按字母顺序：ai-dev → doc-save

version: "2.0"

modules:
  # 故意打乱顺序，测试系统是否能正确排序
  git-commit:
    enabled: true
    version: v1.0
    priority: 80
  
  workflow:
    enabled: true
    version: v1.0
    priority: 200  # 最高优先级，应该第一个加载
  
  git-rollback:
    enabled: true
    version: v1.0
    priority: 70   # 最低优先级，应该最后加载
  
  ai-dev:
    enabled: true
    version: v1.0
    priority: 100
  
  doc-save:
    enabled: true
    version: v1.0
    priority: 90
